<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:'DM Sans',sans-serif}

/* HERO LIMPIO */
.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:110px 40px 60px;
  position:relative;

  background-image:url('https://cdn.shopify.com/s/files/1/0609/5496/8134/files/SKINCARE_COREANO_ORIGINAL_ENIGMA_STORE.jpg?v=1777326263');
  background-size:cover;
  background-position:right center;
  background-repeat:no-repeat;
}

/* ELIMINAMOS CAPAS */
.hero::after{display:none;}
.hero-right{display:none;}

/* TEXTO */
.hero-left{
  max-width:500px;
}

.hero-tag{
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
  margin-bottom:15px;
  color:#555;
}

.hero-title{
  font-size:64px;
  font-weight:700;
  margin-bottom:10px;
}

.hero-sub{
  font-size:16px;
  margin-bottom:30px;
  color:#666;
}

/* CTA PRO */
.btn-primary{
  background:#1E88E5;
  color:#fff;
  padding:16px 34px;
  border-radius:50px;
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-decoration:none;
  font-weight:600;
  display:inline-block;
  position:relative;

  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 25px rgba(30,136,229,.35);
}

/* HOVER */
.btn-primary:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 15px 35px rgba(30,136,229,.5);
}

/* PULSE */
.btn-primary::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:50px;
  background:rgba(30,136,229,.4);
  z-index:-1;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.6}
  70%{transform:scale(1.4);opacity:0}
  100%{opacity:0}
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{
    grid-template-columns:1fr;
    padding:80px 20px;
    background-position:center;
  }

  .hero-title{
    font-size:40px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-left">
    <div class="hero-tag">Skincare Coreano Original</div>

    <h1 class="hero-title">
      Piel luminosa<br>sin esfuerzo
    </h1>

    <p class="hero-sub">
      Descubre fórmulas coreanas que hidratan, iluminan y transforman tu piel desde la primera aplicación.
    </p>

    <a href="#productos" class="btn-primary">
      Ver productos con descuento →
    </a>
  </div>
</section>

</body>
</html>
