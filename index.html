<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enigma Store</title>

<style>

/* =========================
   🎨 PALETA NUEVA
   ========================= */
:root{
  --cream:#FFEFCD;
  --blush:#F5E6D3;
  --rose:#E09132;   /* Apricot */
  --deep:#424530;

  --text:#5E5347;
  --muted:#A58E74;
  --white:#fff;

  --gold:#E09132;
  --gold-l:#FFEFCD;
  --sage:#A58E74;
  --wa:#25D366;
}

/* =========================
   TODO TU CSS ORIGINAL
   ========================= */

body{
  font-family:sans-serif;
  background:var(--cream);
  color:var(--text);
}

/* =========================
   🔥 BOTÓN IR A PAGO FIX
   ========================= */

.shopify-btn{
  background:#1a1a1a !important;
  color:#fff;
  transition:all .35s cubic-bezier(.34,1.56,.64,1) !important;
}

.shopify-btn:hover{
  background:#E09132 !important;
  transform:scale(1.03) translateY(-1px) !important;
  box-shadow:0 12px 30px rgba(224,145,50,.35) !important;
}

.shopify-btn:active{
  background:#c97c25 !important;
  transform:scale(1.05) !important;
  box-shadow:0 6px 20px rgba(224,145,50,.4) !important;
}

</style>
</head>

<body>

<!-- TU LANDING ORIGINAL (SIN CAMBIOS) -->
<!-- SOLO EJEMPLO VISUAL, TU CÓDIGO REAL SIGUE IGUAL -->

<button class="shopify-btn">
  Ir a Pago →
</button>

</body>
</html>
