<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enigma Store Chile</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --cream:#FFEFCD;
  --rose:#E09132;
  --deep:#424530;
  --muted:#A58E74;
  --white:#fff;
}

/* BASE */
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--deep);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 40px;
  background:#fff;
  z-index:10;
}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:120px 40px 60px;
}

/* TEXTO */
.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:64px;
  line-height:1;
}

.hero-sub{
  margin:20px 0;
  color:var(--muted);
}

/* BOTONES */
.btn-primary{
  background:var(--rose);
  color:#fff;
  padding:14px 28px;
  border-radius:30px;
  text-decoration:none;
}

/* STATS */
.hero-stats{
  display:flex;
  gap:12px;
  margin-top:30px;
}

.stat-card{
  background:rgba(255,255,255,.7);
  padding:14px 18px;
  border-radius:12px;
}

.stat-card strong{
  display:block;
  font-size:20px;
}

.stat-card span{
  font-size:11px;
  color:var(--muted);
}

/* IMAGEN */
.hero-img img{
  width:100%;
  max-width:580px;
  margin:auto;
  display:block;
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
  }
}

</style>
</head>

<body>

<nav>Enigma Store</nav>

<section class="hero">

  <!-- TEXTO -->
  <div>

    <h1 class="hero-title">
      Best Korean<br><em>Skincare</em>
    </h1>

    <p class="hero-sub">
      Skincare coreano original con resultados visibles desde la primera semana.
    </p>

    <a href="#" class="btn-primary">Ver productos</a>

    <!-- STATS -->
    <div class="hero-stats">

      <div class="stat-card">
        <strong class="count" data-target="3200">0</strong>
        <span>Clientes felices</span>
      </div>

      <div class="stat-card">
        <strong>100%</strong>
        <span>Productos originales</span>
      </div>

      <div class="stat-card">
        <strong>Todo Chile</strong>
        <span>Despacho seguro</span>
      </div>

    </div>

  </div>

  <!-- IMAGEN -->
  <div class="hero-img">
    <img src="https://cdn.shopify.com/s/files/1/0609/5496/8134/files/SKIncare_Coreano_original.png?v=1777427752">
  </div>

</section>

<script>

/* CONTADOR */
document.addEventListener("DOMContentLoaded", () => {

  const counters = document.querySelectorAll('.count');

  counters.forEach(counter => {

    const update = () => {
      const target = +counter.getAttribute('data-target');
      const current = +counter.innerText;

      const increment = target / 60;

      if(current < target){
        counter.innerText = Math.ceil(current + increment);
        setTimeout(update, 20);
      } else {
        counter.innerText = target.toLocaleString('es-CL');
      }
    };

    update();

  });

});

</script>

</body>
</html>
