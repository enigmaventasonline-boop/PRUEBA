<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Korean Skincare — Enigma Store Chile</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* =========================
   🎨 NUEVA PALETA APLICADA
   ========================= */
:root{
  --cream:#FFEFCD;        /* Warm Ivory */
  --blush:#F5E6D3;
  --rose:#E09132;         /* Apricot */
  --deep:#424530;         /* Fern */

  --text:#5E5347;
  --muted:#A58E74;        /* Natural */
  --white:#fff;

  --gold:#E09132;
  --gold-l:#FFEFCD;
  --sage:#A58E74;
  --wa:#25D366;
}

/* =========================
   RESTO DEL CÓDIGO ORIGINAL
   ========================= */

body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 40px;
  background:rgba(255,239,205,.95);
}

.logo{
  font-family:'Cormorant Garamond',serif;
  color:var(--deep);
  text-decoration:none;
}

.nav-links{
  display:flex;
  gap:20px;
  list-style:none;
}

.nav-links a{
  color:var(--text);
  text-decoration:none;
  font-size:12px;
}

.nav-links a:hover{
  color:var(--rose);
}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:120px 40px;
  background:linear-gradient(120deg,var(--cream),var(--blush));
}

.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:70px;
  color:var(--deep);
}

.hero-sub{
  color:var(--muted);
  margin:20px 0;
}

/* BOTONES */
.btn-primary{
  background:var(--deep);
  color:#fff;
  padding:14px 30px;
  border-radius:40px;
  text-decoration:none;
}

.btn-primary:hover{
  background:var(--rose);
}

.btn-ghost{
  border:1px solid var(--deep);
  padding:14px 30px;
  border-radius:40px;
  text-decoration:none;
  color:var(--deep);
}

.btn-ghost:hover{
  background:var(--deep);
  color:#fff;
}

/* PRODUCTOS */
.products-sec{
  padding:80px 40px;
}

.pgrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.pc{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
}

.pimg{
  height:200px;
  background:var(--blush);
}

.pinfo{
  padding:16px;
}

.pname{
  font-family:'Cormorant Garamond',serif;
  color:var(--deep);
}

.pprice{
  color:var(--deep);
}

.addbtn{
  background:var(--deep);
  color:#fff;
  border-radius:50%;
  width:34px;
  height:34px;
  border:none;
}

.addbtn:hover{
  background:var(--rose);
}

/* BENEFICIOS */
.ben-sec{
  background:var(--blush);
  padding:80px 40px;
}

.bcard{
  background:#fff;
  padding:20px;
  border-radius:14px;
  text-align:center;
}

.btitle{
  color:var(--deep);
}

.bdesc{
  color:var(--muted);
}

/* NEWSLETTER */
.nl-sec{
  background:var(--deep);
  color:#fff;
  padding:80px 40px;
  text-align:center;
}

.nlf input{
  padding:12px;
  border-radius:30px;
  border:none;
  margin-right:10px;
}

.nlf button{
  background:var(--rose);
  color:#fff;
  border:none;
  padding:12px 20px;
  border-radius:30px;
}

.nlf button:hover{
  background:var(--gold);
}

/* FOOTER */
footer{
  background:#1a1a1a;
  color:#aaa;
  padding:40px;
  text-align:center;
}

</style>
</head>

<body>

<nav>
  <ul class="nav-links">
    <li><a href="#">Inicio</a></li>
    <li><a href="#">Productos</a></li>
    <li><a href="#">Rutina</a></li>
  </ul>

  <a href="#" class="logo">Enigma Store</a>
</nav>

<section class="hero">
  <div>
    <h1 class="hero-title">Korean<br>Skincare</h1>
    <p class="hero-sub">Skincare coreano para una piel luminosa y saludable</p>

    <a href="#" class="btn-primary">Ver productos</a>
    <a href="#" class="btn-ghost">Rutina</a>
  </div>

  <div>
    <!-- imagen -->
  </div>
</section>

<section class="products-sec">
  <div class="pgrid">
    <div class="pc">
      <div class="pimg"></div>
      <div class="pinfo">
        <div class="pname">Producto</div>
        <div class="pprice">$19.990</div>
      </div>
    </div>
  </div>
</section>

<section class="ben-sec">
  <div class="bcard">
    <div class="btitle">Hidratación</div>
    <div class="bdesc">Resultados visibles</div>
  </div>
</section>

<section class="nl-sec">
  <h2>Obtén 10% OFF</h2>
  <div class="nlf">
    <input type="email" placeholder="Correo">
    <button>Suscribirme</button>
  </div>
</section>

<footer>
  Enigma Store Chile
</footer>

</body>
</html>
