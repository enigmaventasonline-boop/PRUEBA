<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:100px 60px;
  position:relative;
  overflow:hidden;

  background-image:url('https://cdn.shopify.com/s/files/1/0609/5496/8134/files/SKINCARE_COREANO_ORIGINAL_ENIGMA_STORE.jpg?v=1777326263');
  background-size:cover;
  background-position:right center;
}

/* OVERLAY SOLO IZQUIERDA (CLAVE) */
.hero::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:55%;
  background:linear-gradient(to right, rgba(255,255,255,0.92), rgba(255,255,255,0));
  z-index:1;
}

/* CONTENIDO */
.hero-content{
  position:relative;
  z-index:2;
  max-width:520px;
}

/* TAG */
.hero-tag{
  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#8a7f78;
  margin-bottom:15px;
}

/* TITULO */
.hero-title{
  font-size:64px;
  line-height:1.05;
  font-weight:700;
  color:#1a1a1a;
  margin-bottom:15px;
}

/* DESCRIPCIÓN */
.hero-sub{
  font-size:16px;
  color:#555;
  line-height:1.6;
  margin-bottom:25px;
}

/* BENEFICIOS */
.hero-benefits{
  display:flex;
  gap:20px;
  margin-bottom:30px;
}

.hero-benefits span{
  font-size:13px;
  color:#333;
}

/* CTA */
.btn-primary{
  background:#1E88E5;
  color:#fff;
  padding:16px 34px;
  border-radius:50px;
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-decoration:none;
  font-weight:600;
  display:inline-block;

  transition:all .3s ease;
  box-shadow:0 8px 25px rgba(30,136,229,.35);
}

.btn-primary:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 12px 30px rgba(30,136,229,.5);
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{
    padding:80px 20px;
    background-position:center;
  }

  .hero::before{
    width:100%;
    background:rgba(255,255,255,0.9);
  }

  .hero-title{
    font-size:40px;
  }

  .hero-benefits{
    flex-direction:column;
    gap:8px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">

    <div class="hero-tag">
      SKINCARE COREANO ORIGINAL
    </div>

    <h1 class="hero-title">
      Piel luminosa<br>sin esfuerzo
    </h1>

    <p class="hero-sub">
      Descubre fórmulas coreanas que hidratan, iluminan y transforman tu piel desde la primera aplicación.
    </p>

    <div class="hero-benefits">
      <span>💧 Hidratación profunda</span>
      <span>✨ Glow natural</span>
      <span>🛡️ Piel más fuerte</span>
    </div>

    <a href="#productos" class="btn-primary">
      Ver productos con descuento →
    </a>

  </div>
</section>

</body>
</html>
