<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enigma Store - Hero Aplicado</title>
<style>
body{margin:0;font-family:sans-serif}

/* HERO */
.hero-enigma{
  position:relative;
  min-height:90vh;
  display:flex;
  align-items:center;
  padding:80px 6%;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  z-index:0;
}

.hero-bg img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.9) contrast(1.05);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:560px;
  color:#2C2420;
}

.hero-content h1{
  font-size:48px;
  margin-bottom:16px;
}

.hero-content p{
  font-size:18px;
  margin-bottom:24px;
}

.hero-btn{
  background:#1d1d1b;
  color:#fff;
  padding:14px 28px;
  border-radius:30px;
  text-decoration:none;
}

</style>
</head>
<body>

<section class="hero-enigma">
  <div class="hero-bg">
    <img src="https://cdn.shopify.com/s/files/1/0609/5496/8134/files/SKINCARE_COREANO_ORIGINAL_ENIGMA_STORE.jpg?v=1777326263">
  </div>

  <div class="hero-content">
    <h1>Skincare coreano para una piel luminosa</h1>
    <p>Sérums, tónicos y cremas que hidratan, iluminan y mejoran tu piel.</p>
    <a href="#" class="hero-btn">Comprar ahora</a>
  </div>
</section>

</body>
</html>
