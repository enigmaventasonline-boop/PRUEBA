<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enigma Store</title>

<style>

:root{
  --cream:#FFEFCD;
  --blush:#F5E6D3;
  --rose:#E09132;
  --deep:#424530;
  --muted:#A58E74;
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:80px 40px;
  min-height:100vh;
}

.hero-title{
  font-size:60px;
  color:var(--deep);
}

.hero-sub{
  color:var(--muted);
  margin:15px 0;
}

/* BOTONES */
.btn{
  padding:14px 25px;
  border-radius:30px;
  border:none;
  cursor:pointer;
}

.btn-primary{
  background:var(--rose);
  color:#fff;
}

/* STATS */
.hero-stats{
  display:flex;
  gap:14px;
  margin-top:25px;
  flex-wrap:wrap;
}

.stat-card{
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(10px);
  padding:16px 22px;
  border-radius:14px;
  min-width:140px;
  transition:.3s;
}

.stat-card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.stat-card strong{
  font-size:22px;
  color:var(--deep);
}

.stat-card span{
  font-size:11px;
  color:var(--muted);
}

/* IMAGEN */
.hero-img img{
  width:100%;
  max-width:600px;
  display:block;
  margin:auto;
}

</style>
</head>

<body>

<section class="hero">

  <div>
    <h1 class="hero-title">
      Skincare coreano<br>
      para una piel glow
    </h1>

    <p class="hero-sub">
      Rutinas coreanas seleccionadas para hidratar, iluminar y fortalecer tu piel.
    </p>

    <button class="btn btn-primary">Ver productos</button>

    <!-- STATS -->
    <div class="hero-stats">

      <div class="stat-card">
        <strong class="count" data-target="3200">0</strong>
        <span>Clientes felices</span>
      </div>

      <div class="stat-card">
        <strong>100%</strong>
        <span>Productos originales</span>
      </div>

      <div class="stat-card">
        <strong>Todo Chile</strong>
        <span>Despacho seguro</span>
      </div>

    </div>

  </div>

  <div class="hero-img">
    <img src="https://cdn.shopify.com/s/files/1/0609/5496/8134/files/SKIncare_Coreano_original.png?v=1777427752">
  </div>

</section>

<script>
const counters = document.querySelectorAll('.count');

counters.forEach(counter => {
  const updateCount = () => {
    const target = +counter.getAttribute('data-target');
    const count = +counter.innerText;

    const increment = target / 60;

    if(count < target){
      counter.innerText = Math.ceil(count + increment);
      setTimeout(updateCount, 20);
    } else {
      counter.innerText = target.toLocaleString('es-CL');
    }
  };

  updateCount();
});
</script>

</body>
</html>
